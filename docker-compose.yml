version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: budget-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/budget.db
      - FIREBASE_CREDENTIALS_PATH=/app/firebase-private-key.json
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,https://zeli8888.ddns.net
      - APP_ENV=production
    volumes:
      - budget_data:/app/data
      - ./firebase-private-key.json:/app/firebase-private-key.json:ro

volumes:
  budget_data:
